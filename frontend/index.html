<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ananta Cars — Compraventa de vehículos de ocasión</title>
  <meta name="description" content="Los mejores coches de segunda mano. Revisados, con garantía y al mejor precio."/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#e8311a"/>
  <link rel="apple-touch-icon" href="/assets/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --negro:#0a0a0a;--carbon:#141414;--gris-oscuro:#1e1e1e;--gris-medio:#2c2c2c;
      --gris-linea:#333;--gris-texto:#888;--blanco:#f5f5f0;--blanco-suave:#d0cfc8;
      --rojo:#e8311a;--rojo-hover:#c4280f;
      --fuente-titulo:'Barlow Condensed',sans-serif;--fuente-cuerpo:'Barlow',sans-serif;
      --radio:4px;--transicion:0.2s ease;
    }
    [data-theme="light"]{
      --negro:#f0f0ec;--carbon:#e8e8e4;--gris-oscuro:#ddddd8;--gris-medio:#d0d0cb;
      --gris-linea:#ccc;--gris-texto:#666;--blanco:#1a1a1a;--blanco-suave:#333;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--negro);color:var(--blanco);font-family:var(--fuente-cuerpo);font-weight:400;min-height:100vh;transition:background 0.3s,color 0.3s}

    header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--gris-linea);padding:0 5vw;display:flex;align-items:center;justify-content:space-between;height:64px}
    [data-theme="light"] header{background:rgba(240,240,236,0.96)}
    .logo{font-family:var(--fuente-titulo);font-size:1.7rem;font-weight:800;letter-spacing:0.04em;color:var(--blanco);text-decoration:none}
    .logo span{color:var(--rojo)}
    nav{display:flex;align-items:center;gap:0.5rem}
    nav a{color:var(--gris-texto);font-size:0.82rem;text-decoration:none;margin-left:1.5rem;letter-spacing:0.08em;text-transform:uppercase;transition:color var(--transicion)}
    nav a:hover{color:var(--blanco)}
    .btn-tema{background:transparent;border:1px solid var(--gris-linea);color:var(--gris-texto);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-left:1rem}
    .btn-tema:hover{border-color:var(--blanco);color:var(--blanco)}
    .btn-comparar-header{background:var(--rojo);color:#fff;font-family:var(--fuente-titulo);font-weight:700;font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;padding:6px 14px;border-radius:var(--radio);text-decoration:none;margin-left:1rem;display:none;transition:opacity 0.2s}
    .btn-comparar-header:hover{opacity:0.88}
    .btn-comparar-header.visible{display:inline-flex;align-items:center;gap:6px}
    .btn-wa-header{background:#25d366;color:#000;font-family:var(--fuente-titulo);font-weight:700;font-size:0.82rem;letter-spacing:0.06em;text-transform:uppercase;padding:7px 16px;border-radius:var(--radio);text-decoration:none;margin-left:1rem;transition:opacity var(--transicion)}
    .btn-wa-header:hover{opacity:0.88}

    /* ── HERO ── */
    .hero{
      padding:52px 5vw 48px;
      border-bottom:1px solid var(--gris-linea);
      position:relative;overflow:hidden;
      background-color:var(--carbon);
      background-size:cover;background-position:center;
      display:flex;flex-direction:column;justify-content:center;gap:20px;
      min-height:200px;
    }
    /* Overlay oscuro — activo siempre, más intenso sin imagen */
    .hero::before{
      content:'';position:absolute;inset:0;z-index:0;
      background:linear-gradient(105deg,rgba(10,10,10,0.97) 0%,rgba(10,10,10,0.88) 55%,rgba(10,10,10,0.55) 100%);
      transition:background 0.4s;
    }
    /* Sin imagen: overlay sutil + decoración roja lateral */
    .hero:not(.con-imagen)::after{
      content:'';position:absolute;top:0;right:0;bottom:0;width:4px;
      background:linear-gradient(180deg,transparent,var(--rojo) 40%,var(--rojo) 60%,transparent);
      opacity:0.4;
    }
    .hero > *{position:relative;z-index:1}
    .hero-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .hero-label{font-family:var(--fuente-titulo);font-size:0.72rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--rojo);margin-bottom:10px}
    .hero h1{font-family:var(--fuente-titulo);font-size:clamp(2.2rem,5.5vw,3.8rem);font-weight:800;line-height:0.96;color:var(--blanco);max-width:600px}
    .hero h1 em{color:var(--rojo);font-style:normal}
    .hero-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .hero-stats{display:flex;gap:24px;flex-wrap:wrap}
    .hero-stat{display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--gris-texto)}
    .hero-stat-dot{width:6px;height:6px;border-radius:50%;background:var(--rojo);flex-shrink:0}
    .hero-links{display:flex;gap:16px;flex-wrap:wrap}
    .hero-link{color:var(--gris-texto);font-size:0.78rem;text-decoration:none;letter-spacing:0.06em;transition:color 0.2s;border-bottom:1px solid var(--gris-linea);padding-bottom:2px;white-space:nowrap}
    .hero-link:hover{color:var(--blanco);border-color:var(--blanco)}
    @media(max-width:600px){
      .hero{padding:36px 4vw 32px;min-height:160px}
      .hero h1{font-size:clamp(2rem,8vw,2.8rem)}
      .hero-stats{gap:14px}
    }

    /* ── FILTROS ── */
    .filtros-wrap{border-bottom:1px solid var(--gris-linea);background:var(--carbon)}
    .filtros-header{display:flex;align-items:center;justify-content:space-between;padding:12px 5vw;cursor:pointer;user-select:none;gap:12px}
    .filtros-header:hover .filtros-toggle-btn{border-color:var(--blanco);color:var(--blanco)}
    .filtros-titulo{font-family:var(--fuente-titulo);font-size:0.72rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--gris-texto);display:flex;align-items:center;gap:10px}
    .filtros-activos-badge{background:var(--rojo);color:#fff;font-size:0.6rem;font-weight:700;padding:2px 7px;border-radius:10px;display:none}
    .filtros-activos-badge.visible{display:inline-block}
    .filtros-toggle-btn{background:transparent;border:1px solid var(--gris-linea);color:var(--gris-texto);font-family:var(--fuente-titulo);font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 14px;border-radius:var(--radio);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .filtros-body{padding:0 5vw 14px;display:none}
    .filtros-body.abierto{display:block}
    .filtros{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
    .filtro-grupo{display:flex;flex-direction:column;gap:4px}
    .filtro-grupo label{font-size:0.62rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--gris-texto)}
    .filtro-grupo select,.filtro-grupo input{background:var(--gris-oscuro);border:1px solid var(--gris-linea);color:var(--blanco);font-family:var(--fuente-cuerpo);font-size:0.85rem;padding:7px 10px;border-radius:var(--radio);min-width:120px;cursor:pointer;appearance:none}
    .filtro-grupo select:focus,.filtro-grupo input:focus{outline:none;border-color:var(--rojo)}
    .btn-filtrar{background:var(--rojo);color:var(--blanco);font-family:var(--fuente-titulo);font-weight:700;font-size:0.88rem;letter-spacing:0.1em;text-transform:uppercase;padding:8px 20px;border:none;border-radius:var(--radio);cursor:pointer;transition:background var(--transicion);align-self:flex-end}
    .btn-filtrar:hover{background:var(--rojo-hover)}
    .btn-reset{background:transparent;color:var(--gris-texto);font-family:var(--fuente-titulo);font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;padding:8px 12px;border:1px solid var(--gris-linea);border-radius:var(--radio);cursor:pointer;transition:all var(--transicion);align-self:flex-end}
    .btn-reset:hover{color:var(--blanco);border-color:var(--gris-texto)}

    /* Filtros móvil — scroll horizontal en lugar de apilar todo */
    @media(max-width:600px){
      .filtros-body.abierto .filtros{flex-wrap:nowrap;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
      .filtros::-webkit-scrollbar{display:none}
      .filtro-grupo{flex-shrink:0}
      .filtro-grupo select,.filtro-grupo input{min-width:110px;font-size:0.82rem}
      .btn-filtrar,.btn-reset{flex-shrink:0}
    }

    .resultados-bar{padding:12px 5vw;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--gris-linea);flex-wrap:wrap;gap:8px}
    .resultados-bar span{font-size:0.8rem;color:var(--gris-texto);letter-spacing:0.06em}
    .resultados-bar strong{color:var(--blanco)}

    .grid-coches{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--gris-linea);border-top:1px solid var(--gris-linea)}
    .tarjeta{background:var(--carbon);cursor:pointer;transition:background var(--transicion);overflow:hidden;position:relative}
    .tarjeta:hover{background:var(--gris-oscuro)}
    .tarjeta-destacada{border-top:2px solid #f5c400}
    .tarjeta-foto{width:100%;aspect-ratio:16/10;background:var(--gris-oscuro);overflow:hidden;position:relative}
    .foto-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(18px) brightness(0.5) saturate(1.2);transform:scale(1.1);transition:transform 0.4s ease}
    .tarjeta:hover .foto-bg{transform:scale(1.15)}
    .tarjeta-foto img{position:relative;z-index:1;width:100%;height:100%;object-fit:contain;transition:transform 0.4s ease}
    .tarjeta:hover .tarjeta-foto img{transform:scale(1.03)}

    /* ── PLACEHOLDER ELEGANTE ── */
    .tarjeta-foto-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--gris-oscuro)}
    .tarjeta-foto-placeholder svg{opacity:0.18}
    .tarjeta-foto-placeholder span{font-family:var(--fuente-titulo);font-size:0.75rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gris-texto);opacity:0.5}

    .estado-badge{position:absolute;top:12px;left:12px;font-family:var(--fuente-titulo);font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:4px 10px;border-radius:2px;z-index:2}
    .estado-disponible{background:#1a6b3a;color:#7fffaa}
    .estado-reservado{background:#6b4c1a;color:#ffd97f}
    .estado-vendido{background:#3a1a1a;color:#ff8f8f}

    .tarjeta-info{padding:18px 20px 20px}
    .tarjeta-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
    .tarjeta-marca{font-family:var(--fuente-titulo);font-size:0.7rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--rojo)}
    .btn-comparar-tarjeta{background:transparent;border:1px solid var(--gris-linea);color:var(--gris-texto);font-size:0.65rem;padding:3px 8px;border-radius:2px;cursor:pointer;transition:all 0.2s;font-family:var(--fuente-titulo);letter-spacing:0.06em;text-transform:uppercase}
    .btn-comparar-tarjeta:hover{border-color:var(--blanco);color:var(--blanco)}
    .btn-comparar-tarjeta.seleccionado{background:var(--rojo);border-color:var(--rojo);color:#fff}
    .tarjeta-nombre{font-family:var(--fuente-titulo);font-size:1.5rem;font-weight:700;line-height:1.1;color:var(--blanco);margin-bottom:12px;text-transform:uppercase}
    .tarjeta-datos{display:grid;grid-template-columns:1fr 1fr;gap:4px 0;margin-bottom:14px}
    .dato{display:flex;align-items:center;gap:5px;font-size:0.78rem;color:var(--gris-texto);min-height:22px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .tarjeta-footer{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--gris-linea)}
    .tarjeta-precio{font-family:var(--fuente-titulo);font-size:1.7rem;font-weight:800;color:var(--blanco);display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
    .precio-anterior{font-size:1rem;font-weight:400;color:var(--gris-texto);text-decoration:line-through}
    .btn-ver{background:transparent;color:var(--rojo);font-family:var(--fuente-titulo);font-size:0.78rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:7px 14px;border:1px solid var(--rojo);border-radius:var(--radio);cursor:pointer;text-decoration:none;transition:all var(--transicion)}
    .btn-ver:hover{background:var(--rojo);color:var(--blanco)}

    .vacio{grid-column:1/-1;padding:80px 5vw;text-align:center}
    .vacio p{color:var(--gris-texto);font-size:1rem}

    .skeleton{background:linear-gradient(90deg,var(--gris-oscuro) 25%,var(--gris-medio) 50%,var(--gris-oscuro) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radio)}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    .cargando-mas{padding:24px;text-align:center;color:var(--gris-texto);font-size:0.85rem;grid-column:1/-1}

    /* BARRA COMPARADOR FLOTANTE */
    .barra-comparar{position:fixed;bottom:0;left:0;right:0;background:var(--carbon);border-top:1px solid var(--rojo);padding:14px 5vw;display:flex;align-items:center;gap:16px;z-index:150;transform:translateY(100%);transition:transform 0.3s ease;flex-wrap:wrap}
    .barra-comparar.visible{transform:translateY(0)}
    .barra-comparar-titulo{font-family:var(--fuente-titulo);font-size:0.8rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gris-texto);margin-right:auto}
    .barra-coches{display:flex;gap:10px}
    .barra-coche{display:flex;align-items:center;gap:8px;background:var(--gris-oscuro);border:1px solid var(--gris-linea);border-radius:var(--radio);padding:6px 12px;font-size:0.82rem}
    .barra-coche button{background:none;border:none;color:var(--gris-texto);cursor:pointer;font-size:0.9rem;padding:0 2px}
    .btn-ir-comparar{background:var(--rojo);color:#fff;font-family:var(--fuente-titulo);font-weight:800;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;padding:9px 20px;border:none;border-radius:var(--radio);cursor:pointer;transition:opacity 0.2s}
    .btn-ir-comparar:hover{opacity:0.88}
    .btn-limpiar-comparar{background:transparent;color:var(--gris-texto);font-family:var(--fuente-titulo);font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--gris-linea);border-radius:var(--radio);cursor:pointer;transition:all 0.2s}
    .btn-limpiar-comparar:hover{color:var(--blanco);border-color:var(--blanco)}

    /* ETIQUETAS DGT */
    .dgt-badge{display:inline-flex;align-items:center;gap:4px;font-family:Arial,sans-serif;font-size:0.62rem;font-weight:900;padding:2px 6px 2px 2px;border-radius:3px;letter-spacing:0.03em;text-transform:uppercase;vertical-align:middle}
    .dgt-circle{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.5);display:inline-flex;align-items:center;justify-content:center;font-size:0.5rem;font-weight:900;flex-shrink:0}
    .dgt-0{background:#1a7fd4;color:#fff}
    .dgt-0 .dgt-circle{background:#fff;color:#1a7fd4}
    .dgt-eco{background:linear-gradient(90deg,#1a7fd4 50%,#00a550 50%);color:#fff}
    .dgt-eco .dgt-circle{background:#fff;color:#0a5a30;font-size:0.4rem}
    .dgt-c{background:#00a550;color:#fff}
    .dgt-c .dgt-circle{background:#fff;color:#00a550}
    .dgt-b{background:#f5c400;color:#1a1a1a}
    .dgt-b .dgt-circle{background:#fff;color:#b89000}

    .etiqueta-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:var(--fuente-titulo);font-size:0.65rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:2px;z-index:3;white-space:nowrap}
    .precio-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--fuente-titulo);font-size:0.68rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 9px;border-radius:2px;margin-left:4px}
    .fotos-badge{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.4);color:rgba(255,255,255,0.8);font-size:0.68rem;font-weight:600;padding:4px 8px;border-radius:3px;z-index:3;backdrop-filter:blur(4px);display:flex!important;align-items:center;gap:4px}
    .destacado-badge{
      position:absolute;top:10px;right:10px;z-index:3;
      width:28px;height:28px;border-radius:50%;
      background:rgba(10,10,10,0.55);backdrop-filter:blur(6px);
      border:1px solid rgba(245,196,0,0.35);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 1px 6px rgba(0,0,0,0.4);
    }
    .precio-rebajado-tag{display:inline-flex;align-items:center;gap:4px;background:#92400e;color:#fef3c7;font-family:var(--fuente-titulo);font-size:0.62rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:2px}

    /* LOGO */
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-img{height:44px;width:auto;object-fit:contain}
    .logo-texto{font-family:var(--fuente-titulo);font-size:1.5rem;font-weight:800;letter-spacing:0.04em;color:var(--blanco)}

    /* FOOTER */
    .footer-wrap{border-top:1px solid var(--gris-linea)}
    footer{max-width:1100px;margin:0 auto;padding:28px 5vw;display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:24px;align-items:start;border-top:none}
    footer p,.footer-col p{font-size:0.8rem;color:var(--gris-texto);margin-top:5px}
    footer a,.footer-col a{color:var(--gris-texto);text-decoration:none;transition:color 0.2s}
    footer a:hover,.footer-col a:hover{color:var(--blanco)}
    .footer-logo{font-family:var(--fuente-titulo);font-size:1.2rem;font-weight:800;color:var(--blanco)}
    .footer-logo span{color:var(--rojo)}
    .footer-col-center{text-align:center}
    .footer-col-right{text-align:right}
    .redes-footer{display:flex;gap:12px;margin-top:10px}

    @media(max-width:600px){
      header{padding:0 4vw}
      nav .nav-links{display:none}
      .hero{padding:14px 4vw 12px;flex-direction:column;align-items:flex-start;gap:8px}
      .hero h1{font-size:1.4rem;white-space:normal}
      .grid-coches{grid-template-columns:1fr}
      footer{grid-template-columns:1fr}
      .footer-col-center,.footer-col-right{text-align:left}
      .logo-img{height:34px}
      .logo-texto{font-size:1.2rem}
    }
  </style>
</head>
<body>
  <header>
    <a href="/index.html" class="logo"><img src="/assets/logo.png" alt="Ananta Cars" class="logo-img"/><span class="logo-texto" style="color:var(--blanco)">ANANTA<span style="color:var(--blanco)">.</span>CARS</span></a>
    <nav>
      <span class="nav-links">
        <a href="#catalogo">Catálogo</a>
        <a href="como-comprar.html">Cómo comprar</a>
      </span>
      <a id="btn-comparar-header" class="btn-comparar-header" href="#">⚖ Comparar (<span id="num-comparar">0</span>)</a>
      <button class="btn-tema" id="btn-tema" onclick="toggleTema()" title="Cambiar tema">🌙</button>
      <a href="https://wa.me/34600000000" target="_blank" class="btn-wa-header" style="background:#fff;color:#111">📞 Contacto</a>
    </nav>
  </header>

  <section class="hero" id="hero">
    <div class="hero-top">
      <div>
        <p class="hero-label" id="hero-label-txt">Compraventa · Vehículos de ocasión</p>
        <h1 id="hero-titulo-txt">Tu próximo <em>coche</em> te espera.</h1>
      </div>
    </div>
    <div class="hero-bottom">
      <div class="hero-stats">
        <div class="hero-stat"><span class="hero-stat-dot"></span><span id="hero-num-coches">Vehículos disponibles</span></div>
        <div class="hero-stat"><span class="hero-stat-dot"></span><span>Revisados y documentados</span></div>
        <div class="hero-stat"><span class="hero-stat-dot"></span><span>Financiación disponible</span></div>
      </div>
    </div>
  </section>

  <section class="filtros-wrap" id="catalogo">
    <!-- Cabecera colapsable -->
    <div class="filtros-header" onclick="toggleFiltros()">
      <div class="filtros-titulo">
        🔍 Filtrar vehículos
        <span class="filtros-activos-badge" id="badge-filtros">0 activos</span>
      </div>
      <button class="filtros-toggle-btn" id="btn-toggle-filtros">

  <script>
    if ('serviceWorker' in navigator) {
      // SW desactivado temporalmente
    }
    function toggleTema() {
      const html = document.documentElement;
      const tema = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', tema);
      localStorage.setItem('tema', tema);
      document.getElementById('btn-tema').textContent = tema === 'dark' ? '🌙' : '☀️';
    }
    const temaGuardado = localStorage.getItem('tema') || 'dark';
    document.documentElement.setAttribute('data-theme', temaGuardado);
    document.getElementById('btn-tema').textContent = temaGuardado === 'dark' ? '🌙' : '☀️';

    // ── FILTROS COLAPSABLES ────────────────────────────────────────────────
    let _filtrosAbiertos = false;

    function toggleFiltros() {
      _filtrosAbiertos = !_filtrosAbiertos;
      const body   = document.getElementById('filtros-body');
      const btn    = document.getElementById('btn-toggle-filtros');
      const arrow  = document.getElementById('filtros-arrow');
      body.classList.toggle('abierto', _filtrosAbiertos);
      arrow.textContent = _filtrosAbiertos ? '▲' : '▼';
      btn.innerHTML = `<span id="filtros-arrow">${_filtrosAbiertos ? '▲' : '▼'}</span> ${_filtrosAbiertos ? 'Ocultar filtros' : 'Mostrar filtros'}`;
    }

    function actualizarBadgeFiltros() {
      const ids = ['f-q','f-marca','f-precio','f-km','f-cuota'];
      const sels = ['f-combustible','f-carroceria','f-estado','f-etiqueta'];
      let n = ids.filter(id => document.getElementById(id)?.value?.trim()).length;
      n += sels.filter(id => {
        const el = document.getElementById(id);
        return el && el.value && el.value !== 'disponible';
      }).length;
      const badge = document.getElementById('badge-filtros');
      if (badge) {
        badge.textContent = n + (n === 1 ? ' activo' : ' activos');
        badge.classList.toggle('visible', n > 0);
      }
    }

    // Escuchar cambios en filtros para actualizar badge
    document.addEventListener('DOMContentLoaded', () => {
      ['f-q','f-marca','f-precio','f-km','f-cuota','f-combustible','f-carroceria','f-estado','f-etiqueta'].forEach(id => {
        document.getElementById(id)?.addEventListener('change', actualizarBadgeFiltros);
        document.getElementById(id)?.addEventListener('input',  actualizarBadgeFiltros);
      });
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('input[type=text], textarea').forEach(el => {
        el.addEventListener('input', function() {
          if (this.value.length === 1) this.value = this.value.toUpperCase();
        });
        el.setAttribute('autocapitalize', 'sentences');
      });
    });
  </script>
  <script>
    (async () => {
      try {
        const API = "https://anantacars-production.up.railway.app";
        const r = await fetch(API + "/api/config");
        const c = await r.json();
        if (c.direccion) document.getElementById("footer-direccion").textContent = "📍 " + c.direccion;
        if (c.horario)   document.getElementById("footer-horario").textContent   = "🕐 " + c.horario;
        // WhatsApp header dinámico
        const waHeader = document.querySelector('.btn-wa-header');
        if (waHeader && c.whatsapp) waHeader.href = `https://wa.me/${c.whatsapp}`;
        renderRedesFooter(c, document.getElementById("footer-wa"));
        // Imagen de fondo del hero (campo hero_imagen en configuracion_negocio)
        const hero = document.getElementById("hero");
        if (c.hero_imagen && hero) {
          hero.style.backgroundImage = `url('${c.hero_imagen}')`;
          hero.classList.add("con-imagen");
        }
      } catch(e) {}
    })();
  </script>
  <script>
    // Contador de coches en hero
    (async () => {
      try {
        const API = "https://anantacars-production.up.railway.app";
        const r = await fetch(API + "/api/coches?estado=disponible&por_pagina=1");
        const d = await r.json();
        const total = d.total || 0;
        if (total > 0) {
          document.getElementById("hero-num-coches").textContent = total + " vehículo" + (total !== 1 ? "s" : "") + " disponible" + (total !== 1 ? "s" : "");
        }
      } catch(e) {}
    })();
  </script>
