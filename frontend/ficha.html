<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ficha del vehículo — Ananta Cars</title>
  <meta name="description" content="Ficha de vehículo en Ananta Cars"/>
  <meta property="og:type" content="product"/>
  <meta property="og:site_name" content="Ananta Cars"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--negro:#0a0a0a;--carbon:#141414;--gris-oscuro:#1e1e1e;--gris-medio:#2c2c2c;--gris-linea:#333;--gris-texto:#888;--blanco:#f5f5f0;--blanco-suave:#d0cfc8;--rojo:#e8311a;--rojo-hover:#c4280f;--fuente-titulo:'Barlow Condensed',sans-serif;--fuente-cuerpo:'Barlow',sans-serif;--radio:4px;--transicion:0.2s ease}
    [data-theme="light"]{--negro:#f0f0ec;--carbon:#e8e8e4;--gris-oscuro:#ddddd8;--gris-medio:#d0d0cb;--gris-linea:#ccc;--gris-texto:#666;--blanco:#1a1a1a;--blanco-suave:#333}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--negro);color:var(--blanco);font-family:var(--fuente-cuerpo);font-weight:300;transition:background 0.3s,color 0.3s}
    header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--gris-linea);padding:0 5vw;display:flex;align-items:center;justify-content:space-between;height:64px}
    [data-theme="light"] header{background:rgba(240,240,236,0.96)}
    .logo{font-family:var(--fuente-titulo);font-size:1.7rem;font-weight:800;color:var(--blanco);text-decoration:none}
    .logo span{color:var(--rojo)}
    .header-right{display:flex;align-items:center;gap:12px}
    .btn-volver{color:var(--gris-texto);font-size:0.82rem;text-decoration:none;letter-spacing:0.06em;transition:color var(--transicion)}
    .btn-volver:hover{color:var(--blanco)}
    .btn-tema{background:transparent;border:1px solid var(--gris-linea);color:var(--gris-texto);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}

    .ficha-wrap{max-width:1100px;margin:0 auto;padding:40px 5vw 80px}

    /* GALERÍA */
    .galeria{margin-bottom:32px;position:relative}
    .foto-principal{width:100%;aspect-ratio:16/9;background:var(--gris-oscuro);border-radius:var(--radio);overflow:hidden;margin-bottom:10px;position:relative;cursor:zoom-in}
    .foto-bg-principal{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(20px) brightness(0.45) saturate(1.2);transform:scale(1.1)}
    .foto-principal img{position:relative;z-index:1;width:100%;height:100%;object-fit:contain}
    .miniaturas{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
    .miniatura{width:90px;height:60px;border-radius:2px;overflow:hidden;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:border-color var(--transicion)}
    .miniatura.activa{border-color:var(--rojo)}
    .miniatura img{width:100%;height:100%;object-fit:contain;background:var(--gris-oscuro)}
    .nav-foto{position:absolute;top:50%;transform:translateY(-50%);z-index:5;background:rgba(0,0,0,0.6);color:#fff;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
    .nav-foto:hover{background:rgba(0,0,0,0.9)}
    .nav-prev{left:12px}
    .nav-next{right:12px}
    .btn-fullscreen{position:absolute;bottom:12px;right:12px;z-index:5;background:rgba(0,0,0,0.6);color:#fff;border:none;padding:6px 12px;border-radius:var(--radio);cursor:pointer;font-size:0.78rem;font-family:var(--fuente-titulo);letter-spacing:0.08em;text-transform:uppercase;transition:background 0.2s}
    .btn-fullscreen:hover{background:rgba(0,0,0,0.9)}

    /* LIGHTBOX */
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:500;align-items:center;justify-content:center}
    .lightbox.activo{display:flex}
    .lightbox img{max-width:95vw;max-height:92vh;object-fit:contain;border-radius:var(--radio)}
    .lightbox-cerrar{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;opacity:0.7;transition:opacity 0.2s}
    .lightbox-cerrar:hover{opacity:1}
    .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.1);color:#fff;border:none;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:1.4rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
    .lightbox-nav:hover{background:rgba(255,255,255,0.25)}
    .lightbox-prev{left:16px}
    .lightbox-next{right:16px}
    .lightbox-counter{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:0.82rem}

    .ficha-layout{display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start}
    @media(max-width:780px){.ficha-layout{grid-template-columns:1fr}}

    .ficha-marca{font-family:var(--fuente-titulo);font-size:0.75rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--rojo);margin-bottom:6px}
    .ficha-titulo{font-family:var(--fuente-titulo);font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1;margin-bottom:6px}
    .ficha-anio{font-family:var(--fuente-titulo);font-size:1.2rem;color:var(--gris-texto);margin-bottom:24px}

    /* GARANTÍA */
    .sello-garantia{display:inline-flex;align-items:center;gap:8px;background:#1a3a26;border:1px solid #1a6b3a;color:#7fffaa;font-family:var(--fuente-titulo);font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 14px;border-radius:var(--radio);margin-bottom:20px}

    .ficha-datos{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--gris-linea);border:1px solid var(--gris-linea);border-radius:var(--radio);margin-bottom:28px;overflow:hidden}
    .dato-fila{background:var(--carbon);padding:14px 16px;display:flex;flex-direction:column;gap:3px}
    .dato-fila-label{font-size:0.65rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--gris-texto)}
    .dato-fila-valor{font-family:var(--fuente-titulo);font-size:1.1rem;font-weight:700;color:var(--blanco)}

    .descripcion{font-size:0.92rem;line-height:1.7;color:var(--blanco-suave);margin-bottom:28px}

    .video-wrap{margin-bottom:28px}
    .video-wrap h3{font-family:var(--fuente-titulo);font-size:0.75rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--gris-texto);margin-bottom:10px}
    .video-embed{width:100%;aspect-ratio:16/9;border-radius:var(--radio);border:none}

    /* CALCULADORA */
    .calc-wrap{background:var(--gris-oscuro);border:1px solid var(--gris-linea);border-radius:var(--radio);padding:20px;margin-bottom:20px}
    .calc-titulo{font-family:var(--fuente-titulo);font-size:0.72rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gris-texto);margin-bottom:14px}
    .calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .calc-campo{display:flex;flex-direction:column;gap:4px}
    .calc-campo label{font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gris-texto)}
    .calc-campo input,.calc-campo select{background:var(--negro);border:1px solid var(--gris-linea);color:var(--blanco);font-family:var(--fuente-cuerpo);font-size:0.88rem;padding:8px 10px;border-radius:var(--radio)}
    .calc-campo input:focus,.calc-campo select:focus{outline:none;border-color:var(--rojo)}
    .calc-resultado{text-align:center;padding:14px;background:var(--negro);border-radius:var(--radio)}
    .calc-cuota{font-family:var(--fuente-titulo);font-size:2rem;font-weight:800;color:var(--rojo)}
    .calc-detalle{font-size:0.75rem;color:var(--gris-texto);margin-top:4px}

    /* SIDEBAR */
    .sidebar{background:var(--carbon);border:1px solid var(--gris-linea);border-radius:var(--radio);padding:28px;position:sticky;top:84px}
    .sidebar-estado{display:inline-block;font-family:var(--fuente-titulo);font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:5px 12px;border-radius:2px;margin-bottom:16px}
    .estado-disponible{background:#1a6b3a;color:#7fffaa}
    .estado-reservado{background:#6b4c1a;color:#ffd97f}
    .estado-vendido{background:#3a1a1a;color:#ff8f8f}
    .sidebar-precio{font-family:var(--fuente-titulo);font-size:2.8rem;font-weight:800;line-height:1;margin-bottom:8px}
    .sidebar-precio-anterior{font-size:1.1rem;font-weight:400;color:var(--gris-texto);text-decoration:line-through;margin-bottom:4px}
    .sidebar-rebajado{display:inline-block;background:#b45309;color:#fef3c7;font-family:var(--fuente-titulo);font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;margin-bottom:20px}
    .btn-whatsapp{display:block;width:100%;background:#25d366;color:#000;font-family:var(--fuente-titulo);font-weight:800;font-size:1rem;letter-spacing:0.06em;text-transform:uppercase;padding:14px;border-radius:var(--radio);text-align:center;text-decoration:none;transition:opacity var(--transicion);margin-bottom:10px}
    .btn-whatsapp:hover{opacity:0.88}
    .btn-secundario{display:block;width:100%;background:transparent;color:var(--blanco);font-family:var(--fuente-titulo);font-weight:700;font-size:0.9rem;letter-spacing:0.06em;text-transform:uppercase;padding:12px;border:1px solid var(--gris-linea);border-radius:var(--radio);text-align:center;text-decoration:none;transition:all var(--transicion);margin-bottom:10px;cursor:pointer}
    .btn-secundario:hover{border-color:var(--blanco)}
    .sidebar-aviso{font-size:0.72rem;color:var(--gris-texto);margin-top:12px;line-height:1.5;text-align:center}
    .sidebar-compartir{display:flex;gap:8px;margin-top:14px}
    .btn-compartir{flex:1;background:transparent;color:var(--gris-texto);font-family:var(--fuente-titulo);font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:8px;border:1px solid var(--gris-linea);border-radius:var(--radio);cursor:pointer;transition:all 0.2s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
    .btn-compartir:hover{color:var(--blanco);border-color:var(--blanco)}

    /* ALERTA */
    .alerta-box{background:var(--gris-oscuro);border:1px solid var(--gris-linea);border-radius:var(--radio);padding:16px;margin-top:16px}
    .alerta-titulo{font-family:var(--fuente-titulo);font-size:0.72rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gris-texto);margin-bottom:10px}
    .alerta-input{width:100%;background:var(--negro);border:1px solid var(--gris-linea);color:var(--blanco);font-family:var(--fuente-cuerpo);font-size:0.88rem;padding:9px 11px;border-radius:var(--radio);margin-bottom:8px}
    .alerta-input:focus{outline:none;border-color:var(--rojo)}
    .btn-alerta{width:100%;background:transparent;color:var(--blanco);font-family:var(--fuente-titulo);font-weight:700;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;padding:9px;border:1px solid var(--gris-linea);border-radius:var(--radio);cursor:pointer;transition:all 0.2s}
    .btn-alerta:hover{border-color:var(--blanco)}
    .alerta-msg{font-size:0.78rem;margin-top:8px;display:none;text-align:center}

    .cargando{padding:80px 5vw;text-align:center;color:var(--gris-texto)}
    footer{padding:40px 5vw;border-top:1px solid var(--gris-linea);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
    footer p{font-size:0.8rem;color:var(--gris-texto)}
    .footer-logo{font-family:var(--fuente-titulo);font-size:1.2rem;font-weight:800;color:var(--blanco)}
    .footer-logo span{color:var(--rojo)}
  
    .logo { display:flex; align-items:center; }
    .logo-img { height:44px; width:auto; object-fit:contain; }
    @media(max-width:600px) { .logo-img { height:36px; } }
  
    .etiqueta-0   { background:#00b300; color:#fff; }
    .etiqueta-eco { background:#0066cc; color:#fff; }
    .etiqueta-c   { background:#e6b800; color:#000; }
    .etiqueta-b   { background:#333;    color:#fff; }
  </style>
</head>
<body>
<header>
  <a href="/index.html" class="logo"><img src="/assets/logo.png" alt="Ananta Cars" class="logo-img"/></a>
  <div class="header-right">
    <a href="index.html" class="btn-volver">← Catálogo</a>
    <button class="btn-tema" id="btn-tema" onclick="toggleTema()">🌙</button>
  </div>
</header>

<div class="ficha-wrap" id="ficha-wrap">
  <div class="cargando">Cargando ficha del vehículo...</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-cerrar" onclick="cerrarLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">‹</button>
  <img id="lightbox-img" src="" alt=""/>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">›</button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<footer>
  <div class="footer-logo">ANANTA<span>.</span>CARS</div>
  <p>© 2025 Ananta Cars</p>
</footer>

<script src="/js/ficha.js"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  function toggleTema() {
    const html = document.documentElement;
    const tema = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', tema);
    localStorage.setItem('tema', tema);
    document.getElementById('btn-tema').textContent = tema === 'dark' ? '🌙' : '☀️';
  }
  const t = localStorage.getItem('tema') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btn-tema').textContent = t === 'dark' ? '🌙' : '☀️';
</script>
</body>
</html>
