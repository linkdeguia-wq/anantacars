<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Página no encontrada — Ananta Cars</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root{--negro:#0a0a0a;--carbon:#141414;--gris-linea:#333;--gris-texto:#888;--blanco:#f5f5f0;--rojo:#e8311a;--fuente-titulo:'Barlow Condensed',sans-serif;--fuente-cuerpo:'Barlow',sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--negro);color:var(--blanco);font-family:var(--fuente-cuerpo);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
    .num{font-family:var(--fuente-titulo);font-size:clamp(6rem,20vw,12rem);font-weight:800;color:var(--rojo);line-height:1;opacity:0.15}
    h1{font-family:var(--fuente-titulo);font-size:clamp(1.5rem,4vw,2.5rem);font-weight:800;margin:-20px 0 16px}
    p{color:var(--gris-texto);font-size:1rem;margin-bottom:32px;max-width:400px}
    a{background:var(--rojo);color:#fff;font-family:var(--fuente-titulo);font-weight:700;font-size:0.9rem;letter-spacing:0.1em;text-transform:uppercase;padding:12px 28px;border-radius:4px;text-decoration:none;transition:opacity 0.2s}
    a:hover{opacity:0.88}
    .logo{font-family:var(--fuente-titulo);font-size:1.4rem;font-weight:800;position:absolute;top:24px;left:5vw;text-decoration:none;color:var(--blanco)}
    .logo span{color:var(--rojo)}
  </style>
</head>
<body>
  <a href="/" class="logo"><img src="/assets/logo.png" alt="Ananta Cars" class="logo-img"/></a>
  <div class="num">404</div>
  <h1>Página no encontrada</h1>
  <p>El vehículo o página que buscas no existe o ya no está disponible.</p>
  <a href="/">Ver catálogo completo</a>
<script src="/js/config-aplicar.js"></script>
</body>
</html>
