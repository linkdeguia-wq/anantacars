<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>En mantenimiento — Ananta Cars</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root{--negro:#0a0a0a;--carbon:#141414;--gris-linea:#333;--gris-texto:#888;--blanco:#f5f5f0;--rojo:#e8311a;--fuente-titulo:'Barlow Condensed',sans-serif;--fuente-cuerpo:'Barlow',sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--negro);color:var(--blanco);font-family:var(--fuente-cuerpo);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 5vw}
    .icono{font-size:3rem;margin-bottom:24px;opacity:0.6}
    .label{font-family:var(--fuente-titulo);font-size:0.75rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--rojo);margin-bottom:16px}
    h1{font-family:var(--fuente-titulo);font-size:clamp(2rem,6vw,3.5rem);font-weight:800;line-height:1;margin-bottom:16px;max-width:600px}
    .desc{color:var(--gris-texto);font-size:1rem;margin-bottom:40px;max-width:440px;line-height:1.6}
    .contacto{background:var(--carbon);border:1px solid var(--gris-linea);border-radius:6px;padding:24px 32px;max-width:380px;width:100%}
    .contacto-titulo{font-family:var(--fuente-titulo);font-size:0.7rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--gris-texto);margin-bottom:16px}
    .contacto-fila{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:0.92rem}
    .contacto-fila:last-child{margin-bottom:0}
    .contacto-fila a{color:var(--blanco);text-decoration:none;transition:color 0.2s}
    .contacto-fila a:hover{color:var(--rojo)}
    .contacto-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
    .logo{font-family:var(--fuente-titulo);font-size:1.4rem;font-weight:800;position:absolute;top:24px;left:5vw;display:flex;align-items:center;gap:10px;color:var(--blanco)}
    .logo-img{height:36px;width:auto;object-fit:contain}
    /* Animación de puntos */
    .puntos::after{content:'...';animation:puntos 1.5s infinite;display:inline-block;width:1.5em;text-align:left}
    @keyframes puntos{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
    @media(max-width:480px){.logo{position:relative;top:auto;left:auto;margin-bottom:32px}}
  </style>
</head>
<body>
  <div class="logo">
    <img src="/assets/logo.png" alt="" class="logo-img" id="mant-logo" onerror="this.style.display='none'"/>
    <span id="mant-nombre">ANANTA CARS</span>
  </div>

  <div class="icono">🔧</div>
  <p class="label">Volvemos enseguida</p>
  <h1>Web en mantenimiento<span class="puntos"></span></h1>
  <p class="desc">Estamos realizando mejoras para ofrecerte una mejor experiencia. Disculpa las molestias.</p>

  <div class="contacto">
    <p class="contacto-titulo">Mientras tanto, puedes contactarnos</p>
    <div id="mant-contacto">
      <!-- Se rellena dinámicamente desde config -->
    </div>
  </div>

  <script>
    const API = "https://anantacars-production.up.railway.app";
    fetch(`${API}/api/config`).then(r => r.json()).then(cfg => {
      if (cfg.nombre_negocio) {
        document.getElementById("mant-nombre").textContent = cfg.nombre_negocio.toUpperCase();
        document.title = `En mantenimiento — ${cfg.nombre_negocio}`;
      }
      if (cfg.logo_url) document.getElementById("mant-logo").src = cfg.logo_url;
      if (cfg.color_acento) document.documentElement.style.setProperty("--rojo", cfg.color_acento);

      const cont = document.getElementById("mant-contacto");
      const filas = [];
      if (cfg.telefono) filas.push(`<div class="contacto-fila"><span class="contacto-icon">📞</span><a href="tel:+${cfg.telefono}">+${cfg.telefono.replace(/^34/,"34 ").replace(/(\d{2})(\d{3})(\d{3})(\d{3})/,"$1 $2 $3 $4")}</a></div>`);
      if (cfg.whatsapp) filas.push(`<div class="contacto-fila"><span class="contacto-icon">💬</span><a href="https://wa.me/${cfg.whatsapp}" target="_blank">WhatsApp disponible</a></div>`);
      if (cfg.direccion) filas.push(`<div class="contacto-fila"><span class="contacto-icon">📍</span><span style="color:var(--gris-texto)">${cfg.direccion}</span></div>`);
      if (cfg.horario)   filas.push(`<div class="contacto-fila"><span class="contacto-icon">🕐</span><span style="color:var(--gris-texto)">${cfg.horario}</span></div>`);
      cont.innerHTML = filas.length ? filas.join("") : '<p style="color:var(--gris-texto);font-size:0.85rem">Contáctanos en cuanto volvamos.</p>';
    }).catch(() => {});
  </script>
</body>
</html>
